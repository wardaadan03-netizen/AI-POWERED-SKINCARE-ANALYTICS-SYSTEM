{% extends "base.html" %}

{% block title %}Product Recommendations — Inzaghi's Bliss{% endblock %}

{% block content %}
<div class="recommendations-container">
    <div class="page-header">
        <h1>Product Recommendations</h1>
        <p>Discover products personalized for your skin profile</p>
    </div>
    
    <!-- Filters Section -->
    <div class="filters-grid">
        <div class="filter-card">
            <label>Category</label>
            <select id="categoryFilter" class="filter-select">
                <option value="all">All Categories</option>
                <option value="Cleanser">Cleansers</option>
                <option value="Serum">Serums</option>
                <option value="Moisturizer">Moisturizers</option>
                <option value="Sunscreen">Sunscreens</option>
            </select>
        </div>
        
        <div class="filter-card">
            <label>Max Price</label>
            <input type="number" id="priceFilter" class="filter-input" placeholder="Any amount" step="10">
        </div>
        
        <div class="filter-card">
            <label>Sort By</label>
            <select id="sortFilter" class="filter-select">
                <option value="match">Match Score</option>
                <option value="price_low">Price: Low to High</option>
                <option value="price_high">Price: High to Low</option>
                <option value="rating">Rating</option>
            </select>
        </div>
        
        <div class="filter-card">
            <label>&nbsp;</label>
            <button id="applyFilters" class="btn-filter">
                <i class="fas fa-search"></i> Apply Filters
            </button>
        </div>
    </div>
    
    <!-- Products Grid -->
    <div id="productsContainer" class="products-grid">
        <div class="loading-state">
            <div class="spinner"></div>
            <p>Loading recommendations...</p>
        </div>
    </div>
</div>

<style>
.recommendations-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
}

.page-header {
    text-align: center;
    margin-bottom: 2rem;
    animation: fadeInUp 0.6s ease;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.page-header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #FFFFFF 0%, #6C63FF 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 0.5rem;
}

.page-header p {
    color: rgba(255,255,255,0.5);
}

/* Filters */
.filters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
}

.filter-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 1rem;
}

.filter-card label {
    display: block;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
}

.filter-select {
    width: 100%;
    padding: 0.7rem 1rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: white;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s;
}

.filter-select:focus {
    outline: none;
    border-color: #6C63FF;
}

.filter-input {
    width: 100%;
    padding: 0.7rem 1rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: white;
    font-size: 0.85rem;
    transition: all 0.3s;
}

.filter-input:focus {
    outline: none;
    border-color: #6C63FF;
}

.filter-input::placeholder {
    color: rgba(255,255,255,0.3);
}

.btn-filter {
    width: 100%;
    padding: 0.7rem 1rem;
    background: linear-gradient(135deg, #6C63FF 0%, #FF6584 100%);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}

.btn-filter:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(108,99,255,0.3);
}

/* Products Grid */
.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
}

.product-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.3s ease;
    cursor: pointer;
}

.product-card:hover {
    transform: translateY(-5px);
    border-color: rgba(108,99,255,0.3);
}

.product-image {
    height: 160px;
    background: linear-gradient(135deg, rgba(108,99,255,0.1) 0%, rgba(255,101,132,0.1) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
}

.product-details {
    padding: 1.2rem;
}

.product-name {
    font-size: 1rem;
    font-weight: 700;
    color: white;
    margin-bottom: 0.3rem;
}

.product-brand {
    color: #6C63FF;
    font-size: 0.8rem;
    margin-bottom: 0.5rem;
}

.product-price {
    font-size: 1.1rem;
    font-weight: 700;
    color: #00D2FF;
}

.product-rating {
    color: #FFB347;
    letter-spacing: 2px;
    font-size: 0.8rem;
}

.match-badge {
    background: linear-gradient(135deg, #6C63FF 0%, #FF6584 100%);
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    display: inline-block;
    color: white;
}

.product-info-row {
    display: flex;
    justify-content: space-between;
    margin: 0.8rem 0;
}

/* Loading State */
.loading-state {
    text-align: center;
    padding: 3rem;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 2px solid rgba(108,99,255,0.2);
    border-top-color: #6C63FF;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Empty State */
.empty-state {
    text-align: center;
    padding: 3rem;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
    border-radius: 20px;
}

.empty-state i {
    font-size: 3rem;
    color: rgba(255,255,255,0.3);
    margin-bottom: 1rem;
}

.empty-state p {
    color: rgba(255,255,255,0.5);
}

/* Responsive */
@media (max-width: 768px) {
    .recommendations-container {
        padding: 1rem;
    }
    
    .filters-grid {
        grid-template-columns: 1fr;
    }
    
    .products-grid {
        grid-template-columns: 1fr;
    }
    
    .page-header h1 {
        font-size: 1.5rem;
    }
}
</style>

<script>
let allProducts = [];

$(document).ready(function() {
    loadProducts();
    $('#applyFilters').on('click', applyFilters);
});

function loadProducts() {
    $.ajax({
        url: '/api/recommendations',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({}),
        success: function(data) {
            if (data.success && data.products) {
                allProducts = data.products;
                displayProducts(allProducts);
            } else {
                loadSampleProducts();
            }
        },
        error: function() {
            loadSampleProducts();
        }
    });
}

function loadSampleProducts() {
    allProducts = [
        {name: 'CeraVe Hydrating Cleanser', brand: 'CeraVe', price: 12.99, rating: 4.7, match_percentage: 92, category: 'Cleanser'},
        {name: 'The Ordinary Niacinamide 10%', brand: 'The Ordinary', price: 5.90, rating: 4.4, match_percentage: 88, category: 'Serum'},
        {name: "Paula's Choice Vitamin C", brand: "Paula's Choice", price: 49.00, rating: 4.6, match_percentage: 85, category: 'Serum'},
        {name: 'La Roche-Posay Anthelios', brand: 'La Roche-Posay', price: 29.99, rating: 4.7, match_percentage: 90, category: 'Sunscreen'},
        {name: "Kiehl's Ultra Facial Cream", brand: "Kiehl's", price: 38.00, rating: 4.5, match_percentage: 82, category: 'Moisturizer'},
        {name: 'CeraVe Moisturizing Cream', brand: 'CeraVe', price: 14.99, rating: 4.8, match_percentage: 78, category: 'Moisturizer'}
    ];
    displayProducts(allProducts);
}

function displayProducts(products) {
    const container = $('#productsContainer');
    
    if (products.length === 0) {
        container.html(`
            <div class="empty-state">
                <i class="fas fa-box-open"></i>
                <p>No products match your filters</p>
            </div>
        `);
        return;
    }
    
    container.empty();
    
    products.forEach(p => {
        const stars = '★'.repeat(Math.floor(p.rating)) + '☆'.repeat(5 - Math.floor(p.rating));
        container.append(`
            <div class="product-card" onclick="viewProduct('${p.name.replace(/'/g, "\\'")}')">
                <div class="product-image">
                    <i class="fas fa-flask"></i>
                </div>
                <div class="product-details">
                    <div class="product-name">${p.name}</div>
                    <div class="product-brand">${p.brand}</div>
                    <div class="product-info-row">
                        <span class="product-price">$${p.price.toFixed(2)}</span>
                        <span class="product-rating">${stars}</span>
                    </div>
                    <span class="match-badge">${p.match_percentage}% Match</span>
                </div>
            </div>
        `);
    });
}

function applyFilters() {
    let filtered = [...allProducts];
    
    const category = $('#categoryFilter').val();
    if (category !== 'all') {
        filtered = filtered.filter(p => p.category === category);
    }
    
    const maxPrice = $('#priceFilter').val();
    if (maxPrice) {
        filtered = filtered.filter(p => p.price <= parseFloat(maxPrice));
    }
    
    const sortBy = $('#sortFilter').val();
    if (sortBy === 'price_low') {
        filtered.sort((a, b) => a.price - b.price);
    } else if (sortBy === 'price_high') {
        filtered.sort((a, b) => b.price - a.price);
    } else if (sortBy === 'rating') {
        filtered.sort((a, b) => b.rating - a.rating);
    } else {
        filtered.sort((a, b) => b.match_percentage - a.match_percentage);
    }
    
    displayProducts(filtered);
}

function viewProduct(productName) {
    $.ajax({
        url: '/api/predict-rating',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ product_name: productName }),
        success: function(data) {
            alert(`${productName}\n\nPredicted Rating: ${data.predicted_rating}/5\nConfidence: ${data.confidence}%`);
        }
    });
}
</script>
{% endblock %}
